version: '3.9'

services:
  # PostgreSQL database
  postgres:
    image: postgres:16-alpine
    container_name: lifecoach-postgres
    environment:
      POSTGRES_DB: lifecoach
      POSTGRES_USER: coach
      POSTGRES_PASSWORD: coach
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coach -d lifecoach"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis cache & Celery broker
  redis:
    image: redis:7-alpine
    container_name: lifecoach-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI backend
  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    container_name: lifecoach-api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+psycopg://coach:coach@postgres:5432/lifecoach
      - DATABASE_URL_SYNC=postgresql://coach:coach@postgres:5432/lifecoach
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - ENVIRONMENT=development
      - LOG_LEVEL=info
      - API_CORS_ORIGINS=http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./.env.local:/app/.env.local
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Next.js web frontend
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: lifecoach-web
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_BASE_URL=http://localhost:8000
    depends_on:
      api:
        condition: service_healthy
    volumes:
      - ./.env.local:/app/apps/web/.env.local
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
